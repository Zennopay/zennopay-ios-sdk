name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: xcodebuild test (iOS simulator)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 15
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Show Swift / Xcode version
        run: |
          swift --version
          xcodebuild -version

      # The Package declares iOS-only platforms (iOS 13+), and the SDK
      # depends on AuthenticationServices APIs that are only available on
      # iOS. `swift test` would target the host macOS toolchain and fail,
      # so we run the test bundle against an iOS simulator instead.
      - name: Test on iOS Simulator
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme Zennopay \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || xcodebuild test \
              -scheme Zennopay \
              -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
              CODE_SIGNING_ALLOWED=NO
